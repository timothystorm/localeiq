name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # ======================================================
  #  Build + Lint Job (runs pre-commit, ruff, mypy)
  # ======================================================
  build:
    runs-on: ubuntu-latest

    env:
      PYTHON_VERSION: "3.14"
      POETRY_VERSION: "2.2.1"
      POETRY_VIRTUALENVS_IN_PROJECT: "true"

    steps:
      # ------------------------------
      # Checkout
      # ------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------
      # Python Setup
      # ------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      # ------------------------------
      # Install Poetry
      # ------------------------------
      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install "poetry==${POETRY_VERSION}"

      # ------------------------------
      # Cache Poetry Virtualenv
      # ------------------------------
      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      # ------------------------------
      # Install Dependencies via Makefile
      # ------------------------------
      - name: Install dependencies
        run: |
          make setup

      # ------------------------------
      # Cache pre-commit hook environments
      # ------------------------------
      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: precommit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      # ------------------------------
      # Install pre-commit inside Poetry env
      # ------------------------------
      - name: Install pre-commit
        run: |
          poetry run pip install pre-commit

      # ------------------------------
      # Run pre-commit (ruff, mypy, formatting)
      # ------------------------------
      - name: Run pre-commit checks
        run: |
          poetry run pre-commit run --show-diff-on-failure --color=always --all-files

      # ------------------------------
      # Additional Lint (Makefile)
      # ------------------------------
      - name: Run Makefile lint (ruff + mypy)
        run: make lint


  # ======================================================
  #                 TEST JOB (parallel modules)
  # ======================================================
  test:
    needs: build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        module: [shared, data, date_time, language, culture, geopolitical, economic]
      fail-fast: false

    env:
      PYTHON_VERSION: "3.14"
      POETRY_VERSION: "2.2.1"
      POETRY_VIRTUALENVS_IN_PROJECT: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install "poetry==${POETRY_VERSION}"

      - name: Restore virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: |
          make setup

      # ------------------------------
      # Run Tests For Each Module
      # ------------------------------
      - name: Run tests for module ${{ matrix.module }}
        run: |
          poetry run pytest ${{ matrix.module }}/tests -q