name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHON_VERSION: "3.14"
      POETRY_VERSION: "2.2.1"
      POETRY_VIRTUALENVS_IN_PROJECT: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install "poetry==${POETRY_VERSION}"

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies (make setup)
        run: make setup

      # 💩 Ensure consistency with pre-commit hooks - did you try to push w/o linting?
      - name: Run pre-commit checks
        uses: pre-commit/action@v3.0.1

      - name: Lint checks
        run: make lint

  # ------------------------------
  #     MATRIX TEST JOB
  # ------------------------------
  test:
    needs: build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        module: [shared, data, date_time, language, culture, geopolitical, economic]
      fail-fast: false   # allow all modules to run even if one fails

    env:
      PYTHON_VERSION: "3.14"
      POETRY_VERSION: "2.2.1"
      POETRY_VIRTUALENVS_IN_PROJECT: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install "poetry==${POETRY_VERSION}"

      - name: Restore virtualenv cache
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: make setup

      - name: Run tests for module
        run: poetry run pytest ${{ matrix.module }}/tests