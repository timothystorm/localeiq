name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      PYTHON_VERSION: "3.14"
      POETRY_VERSION: "2.2.1"
      # Put venv in the project directory so we can cache it
      POETRY_VIRTUALENVS_IN_PROJECT: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          # Cache pip downloads across runs (Poetry still uses pip under the hood)
          cache: "pip"

      - name: Install Poetry
        run: |
          python -m pip install --upgrade pip
          python -m pip install "poetry==${POETRY_VERSION}"

      # Cache the virtualenv created by Poetry in .venv
      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies (make setup)
        run: make setup

      # 💩 Ensure consistency with pre-commit hooks - did you try to push w/o linting?
      - name: Run pre-commit checks
        uses: pre-commit/action@v3.0.1

      - name: Lint checks
        run: make lint

      - name: Run tests
        run: make test
