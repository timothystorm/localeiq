[project]
name = "localeiq"
version = "0.1.0"
description = "LocaleIQ monorepo"
authors = [
    { name = "Timothy Storm", email = "timothystorm@gmail.com" }
]
readme = "README.md"
requires-python = ">=3.14"
dependencies = []

[tool.poetry]
package-mode = false

[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[dependency-groups]
dev = [
    "pytest (>=9.0.1,<10.0.0)",
    "black (>=25.11.0,<26.0.0)",
    "isort (>=7.0.0,<8.0.0)",
    "mypy (>=1.18.2,<2.0.0)"
]

[tool.black]
line-length = 88
target-version = ['py314']
extend-exclude = """
(
    alembic
  | migrations
  | .*\\/alembic\\/.*
)
"""

[tool.isort]
profile = "black"
skip = [
    ".*/alembic/.*",
    "migrations"
]

[tool.mypy]
exclude = "(.*/tests/.*)"
